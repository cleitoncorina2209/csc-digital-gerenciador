name: Atualizar precos

on:
  schedule:
    - cron: "0 */4 * * *"    # roda a cada 4 horas
  workflow_dispatch: {}       # tambem permite rodar manual pelo botao "Run workflow"

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de atualizacao de precos
        run: |
          curl -X POST "https://csc-digital-gerenciador.onrender.com/api/atualizar-precos" \
            -H "X-Robo-Token: ${{ secrets.ROBO_TOKEN }}" \
            --fail --max-time 300
